name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install Linux deps (native)
        if: matrix.os == 'ubuntu-latest' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (unix)
        if: matrix.os != 'windows-latest'
        run: |
          BIN=target/${{ matrix.target }}/release/dhl
          ARCHIVE=dhl-${{ matrix.target }}.tar.gz
          tar -czf "$ARCHIVE" -C "$(dirname $BIN)" dhl
          echo "ASSET=$ARCHIVE" >> $GITHUB_ENV

      - name: Package binary (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/dhl.exe"
          $archive = "dhl-${{ matrix.target }}.zip"
          Compress-Archive -Path $bin -DestinationPath $archive
          echo "ASSET=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dhl-${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256 checksums
        run: |
          cd artifacts
          sha256sum * | tee ../checksums.txt

      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            --title "Latest ($(git rev-parse --short HEAD))" \
            --notes "Automated build from commit $(git rev-parse HEAD).

          ## Install

          ### macOS (Homebrew)
          \`\`\`
          brew install mtib/tap/dhl
          \`\`\`

          ### Direct download
          Download the binary for your platform below and place it on your PATH.

          ### Checksums
          \`\`\`
          $(cat checksums.txt)
          \`\`\`
          " \
            --prerelease \
            artifacts/* checksums.txt

  update-tap:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHAs
        id: sha
        run: |
          echo "arm64=$(sha256sum artifacts/dhl-aarch64-apple-darwin.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "x86_64=$(sha256sum artifacts/dhl-x86_64-apple-darwin.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: mtib/homebrew-tap
          token: ${{ secrets.TAP_TOKEN }}
          path: tap

      - name: Update formula
        run: |
          COMMIT=$(git -C ${{ github.workspace }} rev-parse HEAD 2>/dev/null || echo "${{ github.sha }}")
          cat > tap/Formula/dhl.rb << 'FORMULA'
          class Dhl < Formula
            desc "Git worktree workspace manager"
            homepage "https://github.com/mtib/dhl"
            version "latest"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/mtib/dhl/releases/download/latest/dhl-aarch64-apple-darwin.tar.gz"
                sha256 "PLACEHOLDER_ARM64"
              end
              on_intel do
                url "https://github.com/mtib/dhl/releases/download/latest/dhl-x86_64-apple-darwin.tar.gz"
                sha256 "PLACEHOLDER_X86_64"
              end
            end

            def install
              bin.install "dhl"
            end

            test do
              assert_match "dhl", shell_output("#{bin}/dhl --help")
            end
          end
          FORMULA
          sed -i "s/PLACEHOLDER_ARM64/${{ steps.sha.outputs.arm64 }}/" tap/Formula/dhl.rb
          sed -i "s/PLACEHOLDER_X86_64/${{ steps.sha.outputs.x86_64 }}/" tap/Formula/dhl.rb

      - name: Commit and push formula
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dhl.rb
          git diff --cached --quiet || git commit -m "dhl: update to ${{ github.sha }}"
          git push
