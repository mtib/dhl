name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install Linux deps (native)
        if: matrix.os == 'ubuntu-latest' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (unix)
        if: matrix.os != 'windows-latest'
        run: |
          BIN=target/${{ matrix.target }}/release/dhl
          ARCHIVE=dhl-${{ matrix.target }}.tar.gz
          tar -czf "$ARCHIVE" -C "$(dirname $BIN)" dhl
          echo "ASSET=$ARCHIVE" >> $GITHUB_ENV

      - name: Package binary (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/dhl.exe"
          $archive = "dhl-${{ matrix.target }}.zip"
          Compress-Archive -Path $bin -DestinationPath $archive
          echo "ASSET=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dhl-${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      arm64_sha: ${{ steps.checksums.outputs.arm64 }}
      x86_64_sha: ${{ steps.checksums.outputs.x86_64 }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute version tag
        id: version
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          DATE=$(date +%Y%m%d)
          SHA=$(git rev-parse --short HEAD)
          echo "tag=v${CARGO_VERSION}-${DATE}-${SHA}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256 checksums
        id: checksums
        run: |
          cd artifacts
          sha256sum * | tee ../checksums.txt
          echo "arm64=$(sha256sum dhl-aarch64-apple-darwin.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "x86_64=$(sha256sum dhl-x86_64-apple-darwin.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Create versioned release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.version.outputs.tag }}
          git tag "$TAG"
          git push origin "$TAG"
          cat > notes.md << EOF
          ## Install

          ### macOS (Homebrew)
          \`\`\`
          brew install mtib/tap/dhl
          \`\`\`

          ### Direct download
          Download the binary for your platform below and place it on your PATH.

          ### Checksums
          \`\`\`
          $(cat checksums.txt)
          \`\`\`
          EOF
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file notes.md \
            artifacts/* checksums.txt

      - name: Move latest tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.version.outputs.tag }}
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          git tag -f latest
          git push origin latest
          gh release create latest \
            --title "Latest ($TAG)" \
            --notes "Latest release: [$TAG](https://github.com/mtib/dhl/releases/tag/$TAG)" \
            --prerelease

  update-tap:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: mtib/homebrew-tap
          token: ${{ secrets.TAP_TOKEN }}
          path: tap

      - name: Update formula
        run: |
          TAG=${{ needs.release.outputs.tag }}
          ARM64=${{ needs.release.outputs.arm64_sha }}
          X86_64=${{ needs.release.outputs.x86_64_sha }}
          VERSION=${TAG#v}
          cat > tap/Formula/dhl.rb << FORMULA
          class Dhl < Formula
            desc "Git worktree workspace manager"
            homepage "https://github.com/mtib/dhl"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/mtib/dhl/releases/download/${TAG}/dhl-aarch64-apple-darwin.tar.gz"
                sha256 "${ARM64}"
              end
              on_intel do
                url "https://github.com/mtib/dhl/releases/download/${TAG}/dhl-x86_64-apple-darwin.tar.gz"
                sha256 "${X86_64}"
              end
            end

            def install
              bin.install "dhl"
            end

            test do
              assert_match "dhl", shell_output("#{bin}/dhl --help")
            end
          end
          FORMULA

      - name: Commit and push formula
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dhl.rb
          git diff --cached --quiet || git commit -m "dhl: update to ${{ needs.release.outputs.tag }}"
          git push
